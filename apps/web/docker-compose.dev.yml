services:
  frontend-dev:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile.dev
    image: chuchu-frontend-dev:latest
    container_name: chuchu-frontend-dev
    network_mode: host 
    environment:
      - NODE_ENV=development
      - PORT=3334
      - HOSTNAME=localhost
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8002
    command: ["node", "apps/web/server.js"]
    restart: unless-stopped